<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFinance Pro | 備份與還原版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        #mainApp { display: none; }
        .login-screen { display: flex; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-3 flex justify-center items-start">

    <!-- 1. 密碼登入牆 -->
    <div id="loginSection" class="login-screen fixed inset-0 bg-indigo-600 z-[100] flex-col justify-center items-center p-6 text-white">
        <div class="w-full max-w-xs text-center">
            <h2 class="text-3xl font-black mb-2">MyFinance</h2>
            <p class="text-indigo-200 text-sm mb-8">請輸入管理密碼以存取帳本</p>
            <input type="password" id="pwInput" placeholder="請輸入密碼" 
                   class="w-full p-4 rounded-2xl border-none outline-none text-slate-800 text-center text-xl tracking-widest shadow-2xl mb-4">
            <button onclick="checkLogin()" class="w-full bg-white text-indigo-600 font-bold py-4 rounded-2xl shadow-lg hover:bg-indigo-50 transition">解鎖進入</button>
            <p id="errorMsg" class="mt-4 text-rose-300 text-sm font-bold opacity-0 transition-opacity">密碼錯誤</p>
        </div>
    </div>

    <!-- 2. 主程式內容 -->
    <div id="mainApp" class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-5 mt-2">
        
        <div class="flex items-center justify-between gap-2 mb-5 p-2 bg-slate-50 rounded-xl border border-slate-200">
            <h1 class="text-xl font-black text-indigo-600 flex-shrink-0">📊 MyFinance</h1>
            <div class="flex-grow flex items-center gap-1">
                <select id="ledgerSelector" onchange="switchLedger(this.value)" class="flex-grow p-2 text-sm border rounded-lg bg-white outline-none"></select>
                <button onclick="toggleLedgerModal(true)" class="p-2 bg-slate-200 text-slate-600 rounded-lg text-xs">管理</button>
            </div>
        </div>

        <details id="inputDetails" class="mb-5 bg-indigo-50 rounded-2xl border border-indigo-100" open>
            <summary class="p-4 cursor-pointer text-indigo-700 font-bold text-sm">+/- 新增或修改明細</summary>
            <div id="inputForm" class="space-y-3 p-4 pt-0">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="desc" placeholder="項目" class="p-3 border rounded-xl outline-none text-sm">
                    <input type="number" id="amount" placeholder="金額" class="p-3 border rounded-xl outline-none text-sm">
                </div>
                <input type="text" id="remark" placeholder="備註(選填)" class="w-full p-3 border rounded-xl outline-none text-sm">
                <div class="grid grid-cols-2 gap-2">
                    <input type="date" id="consumeDate" class="p-3 border rounded-xl bg-white text-sm">
                    <select id="type" class="p-3 border rounded-xl bg-white font-bold text-sm">
                        <option value="expense">支出 (-)</option>
                        <option value="income">收入 (+)</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <button id="submitBtn" onclick="saveData()" class="flex-[2] bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-lg text-sm">同步至雲端</button>
                    <button id="cancelBtn" onclick="cancelEdit()" class="hidden flex-1 bg-slate-400 text-white font-bold py-3 rounded-xl text-sm">取消</button>
                </div>
            </div>
        </details>

        <div class="mb-5 p-4 bg-slate-50 rounded-2xl border border-slate-200 space-y-3">
            <input type="text" id="searchKeyword" oninput="renderList()" placeholder="🔍 搜尋項目或備註..." class="w-full p-2 text-sm border rounded-lg outline-none">
            <div class="grid grid-cols-2 gap-2">
                <input type="date" id="filterStart" onchange="renderList()" class="p-2 border rounded-lg text-[10px]">
                <input type="date" id="filterEnd" onchange="renderList()" class="p-2 border rounded-lg text-[10px]">
            </div>
            <div id="chartContainer" class="hidden mt-4 pt-4 border-t border-slate-200">
                <div class="h-[180px] flex justify-center"><canvas id="expenseChart"></canvas></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-5 text-center">
            <div class="bg-rose-500 p-3 rounded-2xl text-white">
                <p class="text-[10px] opacity-80">支出</p>
                <p class="text-xl font-bold">$ <span id="totalExp">0</span></p>
            </div>
            <div class="bg-emerald-500 p-3 rounded-2xl text-white">
                <p class="text-[10px] opacity-80">收入</p>
                <p class="text-xl font-bold">$ <span id="totalInc">0</span></p>
            </div>
        </div>

        <div id="list" class="space-y-3 max-h-[300px] overflow-y-auto"></div>
    </div>

    <!-- 管理帳本與備份彈窗 -->
    <div id="ledgerModal" class="fixed inset-0 bg-black/50 z-[110] flex justify-center items-center p-4 hidden">
        <div class="bg-white p-6 rounded-3xl max-w-sm w-full shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-lg text-slate-700">進階管理</h3>
                <button onclick="toggleLedgerModal(false)" class="text-slate-400 text-xl">✕</button>
            </div>
            
            <div class="mb-6">
                <p class="text-[10px] font-bold text-slate-400 mb-2 uppercase">帳本切換與新增</p>
                <div id="ledgerListManaged" class="space-y-2 mb-3"></div>
                <div class="flex gap-1">
                    <input type="text" id="newLedgerName" placeholder="新帳本名稱" class="flex-grow p-2 border rounded-lg text-sm">
                    <button onclick="addLedger()" class="bg-indigo-500 text-white px-3 py-2 rounded-lg font-bold text-xs">新增</button>
                </div>
            </div>

            <div class="mb-6 border-t pt-4">
                <p class="text-[10px] font-bold text-slate-400 mb-2 uppercase">數據備份與還原</p>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="exportToJson()" class="bg-slate-100 text-slate-700 p-3 rounded-xl font-bold text-xs hover:bg-slate-200">📤 匯出備份</button>
                    <button onclick="document.getElementById('importFile').click()" class="bg-slate-100 text-slate-700 p-3 rounded-xl font-bold text-xs hover:bg-slate-200">📥 匯入資料</button>
                    <input type="file" id="importFile" class="hidden" accept=".json" onchange="importFromJson(event)">
                </div>
                <p class="text-[9px] text-slate-400 mt-2">* 匯入將「追加」資料至目前帳本。</p>
            </div>

            <button onclick="logout()" class="w-full border border-rose-500 text-rose-500 p-3 rounded-xl font-bold text-sm">登出系統</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, onSnapshot, query, orderBy, deleteDoc, doc, writeBatch } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 🔥 設定區
        const APP_PASSWORD = "1685858"; 
		const firebaseConfig = {
		  apiKey: "AIzaSyC0VseUx0ghf2oh48xNjzfi31HS5uEP6Pw",
		  authDomain: "myfinanceapp-f08ae.firebaseapp.com",
		  projectId: "myfinanceapp-f08ae",
		  storageBucket: "myfinanceapp-f08ae.firebasestorage.app",
		  messagingSenderId: "103173784019",
		  appId: "1:103173784019:web:c3b48a64a03fafad592f26",
		  measurementId: "G-BZ4SVB2W3H"
		};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let allData = [];
        let editingId = null;
        let myChart = null;
        let unsubscribe = null;

        // --- 登入控制 ---
        window.checkLogin = () => {
            const input = document.getElementById('pwInput').value;
            if (input === APP_PASSWORD) { sessionStorage.setItem('isLoggedIn', 'true'); showApp(); }
            else { document.getElementById('errorMsg').style.opacity = "1"; setTimeout(() => { document.getElementById('errorMsg').style.opacity = "0"; }, 2000); }
        };
        const showApp = () => { document.getElementById('loginSection').style.display = 'none'; document.getElementById('mainApp').style.display = 'block'; init(); };
        window.logout = () => { sessionStorage.removeItem('isLoggedIn'); location.reload(); };
        if (sessionStorage.getItem('isLoggedIn') === 'true') showApp();

        // --- 帳本邏輯 ---
        const getLedgers = () => JSON.parse(localStorage.getItem('myFinLedgers')) || [{ id: 'records_default', name: '預設帳本' }];
        const getCurrentLedger = () => localStorage.getItem('myFinActiveLedger') || 'records_default';

        const init = () => {
            const now = new Date();
            document.getElementById('consumeDate').value = now.toISOString().split('T')[0];
            document.getElementById('filterStart').value = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
            document.getElementById('filterEnd').value = new Date(now.getFullYear(), now.getMonth() + 1, 0).toISOString().split('T')[0];
            setupLedgerUI();
            startListenCloud(getCurrentLedger());
        };

        const setupLedgerUI = () => {
            const ledgers = getLedgers();
            const activeId = getCurrentLedger();
            document.getElementById('ledgerSelector').innerHTML = ledgers.map(l => `<option value="${l.id}" ${l.id === activeId ? 'selected' : ''}>${l.name}</option>`).join('');
            document.getElementById('ledgerListManaged').innerHTML = ledgers.map(l => `
                <div class="flex justify-between items-center text-xs p-2 bg-slate-50 rounded border">
                    <span class="${l.id === activeId ? 'font-bold text-indigo-600' : ''}">${l.name}</span>
                    ${l.id === 'records_default' ? '' : `<button onclick="window.deleteLedgerAction('${l.id}')" class="text-rose-500">刪除</button>`}
                </div>`).join('');
        };

        const startListenCloud = (ledgerId) => {
            if (unsubscribe) unsubscribe();
            unsubscribe = onSnapshot(query(collection(db, ledgerId), orderBy("consumeDate", "desc")), (snapshot) => {
                allData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderList();
            });
        };

        window.switchLedger = (ledgerId) => { localStorage.setItem('myFinActiveLedger', ledgerId); startListenCloud(ledgerId); setupLedgerUI(); };
        window.toggleLedgerModal = (show) => document.getElementById('ledgerModal').classList.toggle('hidden', !show);
        window.addLedger = () => {
            const name = document.getElementById('newLedgerName').value; if (!name) return;
            const ledgers = getLedgers(); const newId = 'records_' + Date.now();
            ledgers.push({ id: newId, name }); localStorage.setItem('myFinLedgers', JSON.stringify(ledgers));
            document.getElementById('newLedgerName').value = ''; window.switchLedger(newId);
        };
        window.deleteLedgerAction = (id) => { if(confirm("確定刪除此帳本索引？")) { const nl = getLedgers().filter(l=>l.id!==id); localStorage.setItem('myFinLedgers', JSON.stringify(nl)); if(id===getCurrentLedger()) window.switchLedger('records_default'); else setupLedgerUI(); }};

        // --- 匯出匯入功能核心 ---
        window.exportToJson = () => {
            if (allData.length === 0) return alert("目前帳本沒有資料可供匯出");
            const activeLedgerName = getLedgers().find(l => l.id === getCurrentLedger())?.name || "帳本";
            const dataStr = JSON.stringify(allData, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.href = url;
            link.download = `備份_${activeLedgerName}_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);
        };

        window.importFromJson = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (!Array.isArray(importedData)) throw new Error("無效的資料格式");
                    if (!confirm(`偵測到 ${importedData.length} 筆資料，確定匯入至目前帳本？`)) return;

                    const batch = writeBatch(db);
                    const colRef = collection(db, getCurrentLedger());
                    
                    importedData.forEach(item => {
                        // 移除舊的 Firebase ID 避免衝突，建立新引用
                        const { id, ...cleanData } = item;
                        const newDocRef = doc(colRef); 
                        batch.set(newDocRef, cleanData);
                    });

                    await batch.commit();
                    alert("匯入成功！");
                    toggleLedgerModal(false);
                } catch (err) {
                    alert("匯入失敗：請確保檔案格式正確");
                    console.error(err);
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // 清除 input
        };

        // --- 基礎增刪改查 ---
        window.saveData = async () => {
            const data = {
                desc: document.getElementById('desc').value.trim(),
                amount: Number(document.getElementById('amount').value),
                type: document.getElementById('type').value,
                consumeDate: document.getElementById('consumeDate').value,
                remark: document.getElementById('remark').value,
                updatedAt: new Date().getTime()
            };
            if (!data.desc || !data.amount) return alert("請輸入項目與金額");
            try {
                if (editingId) await updateDoc(doc(db, getCurrentLedger(), editingId), data);
                else { data.createdAt = new Date().getTime(); await addDoc(collection(db, getCurrentLedger()), data); }
                editingId = null; resetForm(); document.getElementById('inputDetails').open = false;
            } catch (e) { alert("同步失敗"); }
        };

        window.startEdit = (id) => {
            const item = allData.find(r => r.id === id);
            editingId = id; document.getElementById('desc').value = item.desc; document.getElementById('amount').value = item.amount;
            document.getElementById('remark').value = item.remark || ''; document.getElementById('consumeDate').value = item.consumeDate;
            document.getElementById('type').value = item.type; document.getElementById('submitBtn').innerText = "儲存修改";
            document.getElementById('submitBtn').classList.replace('bg-indigo-600', 'bg-orange-500');
            document.getElementById('cancelBtn').classList.remove('hidden'); document.getElementById('inputDetails').open = true;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.cancelEdit = () => { editingId = null; resetForm(); };
        const resetForm = () => {
            document.getElementById('desc').value = ''; document.getElementById('amount').value = ''; document.getElementById('remark').value = '';
            document.getElementById('submitBtn').innerText = "同步至雲端";
            document.getElementById('submitBtn').classList.replace('bg-orange-500', 'bg-indigo-600');
            document.getElementById('cancelBtn').classList.add('hidden');
        };

        window.deleteData = async (id) => { if(confirm("確定刪除？")) await deleteDoc(doc(db, getCurrentLedger(), id)); };

        window.renderList = () => {
            const keyword = document.getElementById('searchKeyword').value.toLowerCase();
            const start = document.getElementById('filterStart').value, end = document.getElementById('filterEnd').value;
            const listEl = document.getElementById('list');
            let exp = 0, inc = 0; listEl.innerHTML = "";
            const expenseGroups = {};
            const filtered = allData.filter(r => (r.consumeDate >= start && r.consumeDate <= end) && (r.desc.toLowerCase().includes(keyword) || (r.remark && r.remark.toLowerCase().includes(keyword))));

            filtered.forEach(r => {
                if (r.type === 'expense') { exp += r.amount; expenseGroups[r.desc] = (expenseGroups[r.desc] || 0) + r.amount; }
                else inc += r.amount;
                listEl.innerHTML += `
                    <div class="bg-white border p-3 rounded-xl shadow-sm relative">
                        <div class="flex justify-between items-start">
                            <div class="max-w-[60%]">
                                <span class="text-[9px] font-bold text-indigo-400">${r.consumeDate}</span>
                                <h3 class="font-bold text-slate-800 text-sm truncate">${r.desc}</h3>
                                ${r.remark ? `<p class="text-[10px] text-slate-500 mt-0.5 truncate italic"># ${r.remark}</p>` : ''}
                            </div>
                            <div class="text-right">
                                <span class="font-black text-sm ${r.type==='expense'?'text-rose-500':'text-emerald-600'}">${r.type==='expense'?'-':'+'}${r.amount.toLocaleString()}</span>
                                <div class="mt-1 flex gap-2 justify-end">
                                    <button onclick="startEdit('${r.id}')" class="text-[9px] text-indigo-600">修改</button>
                                    <button onclick="deleteData('${r.id}')" class="text-[9px] text-rose-400">刪除</button>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('totalExp').innerText = exp.toLocaleString();
            document.getElementById('totalInc').innerText = inc.toLocaleString();
            updateChart(expenseGroups);
            document.getElementById('chartContainer').classList.toggle('hidden', Object.keys(expenseGroups).length === 0);
        };

        const updateChart = (groups) => {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            if (myChart) myChart.destroy();
            if (Object.keys(groups).length === 0) return;
            myChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: Object.keys(groups),
                    datasets: [{ data: Object.values(groups), backgroundColor: ['#4f46e5', '#f43f5e', '#10b981', '#f59e0b', '#8b5cf6', '#06b6d4'], borderWidth: 1 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { size: 9 }, boxWidth: 10 } } } }
            });
        };
    </script>
</body>
</html>
